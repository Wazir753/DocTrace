<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocTrace Sidebar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "DM Mono", monospace;
        background: #0a0a0f;
        color: #f0e6d3;
        overflow: hidden;
        height: 100vh;
      }

      #root {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
      }

      /* Scrollbar styling */
      #root::-webkit-scrollbar {
        width: 6px;
      }

      #root::-webkit-scrollbar-track {
        background: #111120;
      }

      #root::-webkit-scrollbar-thumb {
        background: #c8922a;
        border-radius: 3px;
      }

      #root::-webkit-scrollbar-thumb:hover {
        background: #d4a546;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="sidebar.js"></script>
  </body>
</html>
